directories:
  output: dist
  buildResources: build
appId: com.neurolab.pro
productName: NeuroLab Pro
copyright: Copyright © 2026 NeuroLab
files:
  - filter:
      - main.js
      - ../Visualizer/**/*
extraResources: []
win:
